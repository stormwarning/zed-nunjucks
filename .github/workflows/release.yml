on:
  push:
    branches:
      - main

permissions: {}

jobs:
  changelog:
    name: Update changelog
    runs-on: ubuntu-latest

    permissions:
      # Allow changesets/action to create release and pull request.
      contents: write
      pull-requests: write

    steps:
      # https://github.com/actions/checkout
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # https://github.com/actions/setup-node
      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Install dependencies
        run: npm install

      # https://github.com/changesets/action
      - name: Bump version & update changelog
        id: changesets
        uses: changesets/action@v1
        with:
          commit: Publish release
          title: Publish release
          version: npm run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out new version tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          git fetch --tags
          git checkout v${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}

      # https://github.com/huacnlee/zed-extension-action
      - name: Release Zed extension
        if: steps.changesets.outputs.published == 'true'
        uses: huacnlee/zed-extension-action@v2
        with:
          extension-name: nunjucks
          # extension-path: extensions/${{ extension-name }}
          push-to: stormwarning/zed-extensions
          tag-name: v${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}
        env:
          # Personal Access Token with `repo` & `workflow` scopes.
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
